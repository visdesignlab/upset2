name: Publish Packages to npmjs
on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Extract package version
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Copy README to core
        run: cp README.md packages/core/README.md
      - name: Publish core package
        run: |
          cd packages/core
          npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version --allow-same-version
          npm publish --tag latest
      - name: Copy README to upset
        run: cp README.md packages/upset/README.md
      - name: Update core dependency in upset package
        run: |
          cd packages/upset
          npm pkg set dependencies.@visdesignlab/upset2-core="${{ steps.get_version.outputs.version }}"
      - name: Publish upset package
        run: |
          cd packages/upset
          npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version --allow-same-version
          npm publish --tag latest
